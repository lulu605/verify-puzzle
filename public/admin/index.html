<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理后台 - 验证谜题</title>
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="story-bar">
      <select id="storySelector" class="input" onchange="switchStory(this.value)" style="width:100%;font-size:13px;padding:6px 8px"></select>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="btn btn-xs btn-primary" onclick="createStory()" style="flex:1;font-size:11px">+ 新建</button>
        <button class="btn btn-xs btn-secondary" onclick="copyStory()" style="flex:1;font-size:11px">📋 复制</button>
        <button class="btn btn-xs btn-danger" onclick="deleteStory()" style="flex:1;font-size:11px">🗑</button>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <h2>📖 章节管理</h2>
    <div id="chapterList" class="chapter-list"></div>
    <button class="btn btn-primary" onclick="addChapter()" style="width:100%;margin-top:8px">+ 新建章节</button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-menu-item" onclick="showGameConfig()">⚙ 游戏设置</div>
    <div class="sidebar-menu-item" onclick="showCodes()">🔑 验证码管理</div>
    <div class="sidebar-menu-item" onclick="showComments()">💬 查看留言</div>
  </aside>
  <main class="editor">
    <div id="editorPlaceholder" class="placeholder">← 选择一个节点开始编辑</div>
    <div id="editorContent" class="editor-content" style="display:none">
      <div class="editor-tabs">
        <button class="tab active" data-tab="basic">基本信息</button>
        <button class="tab" data-tab="dialogues">对话编辑</button>
        <button class="tab" data-tab="puzzle">验证设置</button>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-primary" onclick="manualSave()">💾 保存</button>
        <span id="saveStatus" style="font-size:13px;color:#8892b0;line-height:32px"></span>
      </div>
      <div id="tab-basic" class="tab-content active">
        <div class="form-group">
          <label>节点ID</label>
          <input id="editNodeId" disabled class="input">
        </div>
        <div class="form-group">
          <label>节点名称</label>
          <input id="editNodeName" class="input" oninput="autoSave()">
        </div>
        <div class="form-group">
          <label>所属章节</label>
          <div style="display:flex;gap:8px">
            <select id="editChapter" class="input" onchange="autoSave()" style="flex:1"></select>
          </div>
        </div>
        <div class="form-group">
          <label>背景样式（同封面）</label>
          <div class="bg-row">
            <input id="editBgValue" class="input" placeholder="颜色值、CSS渐变或图片URL" oninput="updateBgPreview();autoSave()">
            <button class="btn btn-sm" onclick="uploadBgImg()" title="上传图片">📁</button>
            <button class="btn btn-sm" onclick="resetBg()" title="恢复默认颜色" style="background:transparent;border:1px solid #4a5580;color:#8892b0">↺</button>
            <span id="bgPreview" class="bg-preview" style="background:#0a0e27"></span>
          </div>
        </div>
          <div class="form-group">
          <label>对话栏背景</label>
          <div class="bg-row">
            <input id="editDialogueBg" class="input" placeholder="颜色代码或CSS（留空为默认半透明）" oninput="autoSave()" style="flex:1">
            <span id="dialogueBgPreview" class="bg-preview" style="background:rgba(0,0,0,0.7)"></span>
          </div>
        </div>
          <div class="form-group">
          <label>背景音乐（可选）</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="editNodeMusic" class="input" placeholder="音乐URL或留空" readonly onclick="uploadNodeMusic()" style="flex:1">
            <button class="btn btn-sm" onclick="uploadNodeMusic()" title="上传音乐">📁</button>
            <button class="btn btn-sm btn-secondary" onclick="playNodeMusic()" title="试听">▶</button>
            <button class="btn btn-sm btn-danger" onclick="clearNodeMusic()" title="清除">×</button>
          </div>
        </div>
          <div class="form-group">
          <label>展示模式</label>
          <select id="editDisplayMode" class="input" onchange="autoSave()">
            <option value="dialogue">对话模式（角色+头像）</option>
            <option value="text">文本展示（纯文字逐句显示）</option>
          </select>
        </div>
        <div id="textModeGroup" style="display:none">
          <div class="form-group">
            <label>文本内容（一行一句）</label>
            <textarea id="editTextContent" class="input" rows="6" placeholder="第一句&#10;第二句&#10;第三句&#10;..." oninput="autoSave()" style="font-size:13px"></textarea>
          </div>
          <div class="form-group">
            <label>背景音乐（可选）</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input id="editTextMusic" class="input" placeholder="音乐URL或留空" readonly onclick="uploadTextMusic()" style="flex:1">
              <button class="btn btn-sm" onclick="uploadTextMusic()" title="上传音乐">📁</button>
              <button class="btn btn-sm btn-secondary" onclick="playTextMusic()" title="试听">▶</button>
              <button class="btn btn-sm btn-danger" onclick="clearTextMusic()" title="清除">×</button>
            </div>
          </div>
          <div class="form-group">
            <label>文本展示结束后</label>
            <label style="display:flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer;font-size:14px;color:#ccd6f6">
              <input type="checkbox" id="editShowCreditsAfter" onchange="autoSave()">
              跳转到谢幕字幕
            </label>
          </div>
        </div>
          <div class="form-group">
          <label>跳转节点（验证通过后）</label>
          <select id="editNextNode" class="input" onchange="autoSave()">
            <option value="">无 - 未设置</option>
          </select>
        </div>
        <div class="form-group">
          <button class="btn btn-danger" onclick="deleteNode()">删除此节点</button>
        </div>
      </div>

      <div id="tab-dialogues" class="tab-content">
        <div class="dialogue-editor-layout">
          <div class="dialogue-editor-left">
            <div id="dialogueList" class="dialogue-list"></div>
            <button class="btn btn-primary" onclick="addDialogue()">+ 添加对话</button>
          </div>
          <div class="dialogue-editor-right">
            <div class="preview-header">📱 实时预览</div>
            <div class="preview-phone" id="previewPhone">
              <div class="preview-notch"></div>
              <div class="preview-screen" id="previewScreen">
                <div class="preview-char-area">
                  <img class="preview-char-art" id="previewCharArt" style="display:none">
                  <div class="preview-char-name" id="previewCharName" style="display:none"></div>
                </div>
                <div class="preview-dialogue-box">
                  <div class="preview-speaker" id="previewSpeaker"></div>
                  <div class="preview-text" id="previewText">选择一条对话预览</div>
                  <div class="preview-click-hint">▸</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-puzzle" class="tab-content">
        <div class="form-group">
          <label>问题文本</label>
          <textarea id="editQuestion" class="input" rows="3" oninput="autoSave()"></textarea>
        </div>
        <div class="form-group">
          <label>问题配图</label>
          <div class="upload-row">
            <input id="editQuestionImage" class="input" placeholder="图片URL" oninput="autoSave()">
            <button class="btn btn-secondary" onclick="uploadImg('question')">上传</button>
          </div>
          <img id="questionImagePreview" class="img-preview" style="display:none">
        </div>
        <div class="form-group">
          <label>正确答案</label>
          <input id="editAnswer" class="input" oninput="autoSave()">
        </div>
        <div class="form-group">
          <label>答案匹配规则</label>
          <select id="editMatchRule" class="input" onchange="autoSave()">
            <option value="exact">精确匹配</option>
            <option value="case_insensitive">忽略大小写</option>
            <option value="fuzzy">模糊匹配（包含即可）</option>
          </select>
        </div>
        <div class="form-group">
          <label>最大尝试次数（留空为不限）</label>
          <input id="editMaxAttempts" type="number" class="input" oninput="autoSave()">
        </div>
        <div class="form-group">
          <label>错误提示文案</label>
          <input id="editErrorHint" class="input" oninput="autoSave()">
        </div>
        <div class="form-group">
          <label>线索提示（按错误次数依次显示）</label>
          <div class="clue-row" style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
            <span style="color:#ffa502;font-size:13px;width:50px">线索1</span>
            <input id="editClue1" class="input" placeholder="第一次错误时显示" oninput="autoSave()" style="flex:1">
          </div>
          <div class="clue-row" style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
            <span style="color:#ffa502;font-size:13px;width:50px">线索2</span>
            <input id="editClue2" class="input" placeholder="第二次错误时显示" oninput="autoSave()" style="flex:1">
          </div>
          <div class="clue-row" style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
            <span style="color:#ffa502;font-size:13px;width:50px">线索3</span>
            <input id="editClue3" class="input" placeholder="第三次错误时显示" oninput="autoSave()" style="flex:1">
          </div>
        </div>
        <div class="form-group">
          <label>验证页背景音乐（可选）</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input id="editPuzzleMusic" class="input" placeholder="音乐URL或留空" readonly onclick="uploadPuzzleMusic()" style="flex:1">
            <button class="btn btn-sm" onclick="uploadPuzzleMusic()" title="上传音乐">📁</button>
            <button class="btn btn-sm btn-secondary" onclick="playPuzzleMusic()" title="试听">▶</button>
            <button class="btn btn-sm btn-danger" onclick="clearPuzzleMusic()" title="清除">×</button>
            <button class="btn btn-sm" onclick="applyPuzzleMusicAll()" style="background:#1a3050;border-color:#2a5580;color:#7ab8ff" title="应用到全部节点">全部应用</button>
          </div>
        </div>
        <div class="form-group">
          <label>道具</label>
          <div id="itemsList" class="items-list"></div>
          <button class="btn btn-sm btn-primary" onclick="addItem()" style="margin-top:6px">+ 添加道具</button>
        </div>
      </div>

    </div>
    <div id="gameConfigEditor" class="editor-content" style="display:none">
  <h3 style="color:#64ffda;margin-bottom:16px">⚙ 游戏设置</h3>
  <div class="form-group">
    <label>游戏名称</label>
    <input id="editGameName" class="input" oninput="autoSaveGame()">
  </div>
  <div class="form-group">
    <label>封面标题</label>
    <input id="editCoverTitle" class="input" oninput="autoSaveGame()">
  </div>
  <div class="form-group">
    <label>封面副标题</label>
    <input id="editCoverSubtitle" class="input" oninput="autoSaveGame()">
  </div>
  <div class="form-group">
    <label>按钮文字</label>
    <input id="editCoverBtnText" class="input" oninput="autoSaveGame()">
  </div>
  <div class="form-group">
    <label>封面背景（支持上传图片）</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="editCoverBg" class="input" placeholder="颜色值、CSS渐变或图片URL" oninput="updateCoverBgPreview();autoSaveGame()">
      <button class="btn btn-sm" onclick="uploadCoverBg()" title="上传图片">📁</button>
      <span id="coverBgPreview" class="bg-preview" style="background:linear-gradient(135deg,#0a0e27 0%,#1a1040 50%,#0a0e27 100%)"></span>
    </div>
  </div>
  <div class="form-group">
    <label>章节副标题</label>
    <div id="chapterSubtitleEditor"></div>
    <div style="margin-top:6px;font-size:12px;color:#4a5580">每章一行，格式：章节名称 = 副标题</div>
  </div>
  <div class="form-group">
    <label>封面音乐</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="editCoverMusic" class="input" placeholder="音乐URL或留空" readonly onclick="uploadCoverMusic()" style="flex:1">
      <button class="btn btn-sm" onclick="uploadCoverMusic()" title="上传音乐">📁</button>
      <button class="btn btn-sm btn-secondary" onclick="playCoverMusic()" title="试听">▶</button>
      <button class="btn btn-sm btn-danger" onclick="clearCoverMusic()" title="清除">×</button>
    </div>
    <div style="margin-top:6px;font-size:12px;color:#4a5580">封面背景音乐（mp3），打开页面时自动播放</div>
  </div>
  <div class="form-group">
    <label>章节音乐</label>
    <div id="chapterMusicEditor"></div>
    <div style="margin-top:6px;font-size:12px;color:#4a5580">每个章节可设置一首背景音乐（mp3），进入章节时自动播放</div>
  </div>
  <div class="form-group">
    <label>谢幕字幕（一行一条）</label>
    <textarea id="editCreditsLines" class="input" rows="5" placeholder="感谢游玩&#10;制作人员&#10;..." oninput="autoSaveGame()" style="font-size:13px"></textarea>
  </div>
  <div class="form-group">
    <label>谢幕音乐（可选）</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="editCreditsMusic" class="input" placeholder="音乐URL或留空" readonly onclick="uploadCreditsMusic()" style="flex:1">
      <button class="btn btn-sm" onclick="uploadCreditsMusic()" title="上传音乐">📁</button>
      <button class="btn btn-sm btn-secondary" onclick="playCreditsMusic()" title="试听">▶</button>
      <button class="btn btn-sm btn-danger" onclick="clearCreditsMusic()" title="清除">×</button>
    </div>
  </div>
  <div class="form-group">
    <button class="btn btn-primary" onclick="manualSaveGame()">💾 保存游戏设置</button>
    <span id="gameSaveStatus" style="font-size:13px;color:#8892b0;margin-left:12px"></span>
  </div>
  <div class="sidebar-divider" style="margin:20px 0"></div>
  <h3 style="color:#ffa502;margin-bottom:16px">🔒 修改管理密码</h3>
  <div class="form-group">
    <label>旧密码</label>
    <input id="editOldPwd" type="password" class="input" placeholder="输入旧密码">
  </div>
  <div class="form-group">
    <label>新密码</label>
    <input id="editNewPwd" type="password" class="input" placeholder="至少4个字符">
  </div>
  <div class="form-group">
    <button class="btn btn-primary" onclick="changePassword()">更改密码</button>
    <span id="pwdStatus" style="font-size:13px;color:#8892b0;margin-left:12px"></span>
  </div>
</div>
  <div id="codesView" class="editor-content" style="display:none">
    <h3 style="color:#64ffda;margin-bottom:16px">🔑 验证码管理</h3>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="generateCodes()">生成新验证码</button>
      <select id="codeCount" style="padding:6px 10px;background:#141834;border:1px solid #1a2040;border-radius:6px;color:#fff;font-size:13px;outline:none">
        <option value="1">1个</option>
        <option value="5">5个</option>
        <option value="10">10个</option>
        <option value="20">20个</option>
        <option value="50">50个</option>
      </select>
      <button class="btn btn-secondary" onclick="exportCodes()">📥 导出验证码</button>
      <span id="codeStatus" style="font-size:13px;color:#8892b0;margin-left:8px"></span>
    </div>
    <div id="codesList"></div>
  </div>
  <div id="commentsView" class="editor-content" style="display:none">
    <h3 style="color:#64ffda;margin-bottom:16px">💬 用户留言</h3>
    <div id="commentsList"></div>
  </div>
  </main>
</div>

<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2 style="color:#64ffda;margin-bottom:20px;text-align:center;letter-spacing:2px">🔐 管理后台</h2>
    <div class="form-group">
      <label>请输入密码</label>
      <input id="loginPwd" type="password" class="input" placeholder="管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center">登录</button>
    <div id="loginError" style="color:#ff4757;font-size:13px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<div id="imgUploadModal" class="modal" style="display:none">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <h3>上传文件</h3>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,audio/mpeg,audio/wav,audio/ogg" onchange="handleUpload()">
    <div id="uploadProgress" style="margin-top:10px"></div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
